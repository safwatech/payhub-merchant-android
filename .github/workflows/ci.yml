# CI for the standalone PayHub Merchant Android app.
#
# NOTE: this workflow is meaningful only once `apps/merchant-android/` has been
# split into its own repo (e.g. `safwatech/payhub-merchant-android`) — it is
# *not* one of the SDK mirrors and the mirror-publish machinery does not apply
# to it. In the monorepo it sits here as a reference / for a path-filtered job.
name: Android CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # The PayHub SDK (ly.payhub:payhub-android:1.1.0). Until it's on Maven
      # Central via the safwatech/payhub-android mirror, this build resolves it
      # from mavenLocal() (see settings.gradle.kts). In a standalone repo, either
      # publish the SDK to a private Maven, vendor it, or pull a tagged build:
      #   git clone --depth 1 -b v1.1.0 https://github.com/safwatech/payhub-android
      #   (cd payhub-android && ./gradlew publishToMavenLocal)
      # We skip that here (no-op if the dependency is already published).
      - name: Note on SDK dependency
        run: echo "If the build fails resolving ly.payhub:payhub-android, publish the SDK to mavenLocal first (see settings.gradle.kts)."

      # FCM is optional: without google-services.json the Google-services plugin
      # isn't applied (see app/build.gradle.kts) and assembleDebug still works.
      # If you DO want to exercise FCM in CI, drop a base64 secret and uncomment:
      # - name: Write google-services.json
      #   if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
      #   run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json
      #   working-directory: apps/merchant-android

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck
        working-directory: apps/merchant-android

      - name: Static analysis (detekt)
        run: ./gradlew detekt
        working-directory: apps/merchant-android

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest
        working-directory: apps/merchant-android

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug
        working-directory: apps/merchant-android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/merchant-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  # Release build — wired but disabled until signing secrets exist in the
  # standalone repo. Distinct keystore from the SDK's Maven GPG signing key.
  release:
    if: false
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v3
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"
      - name: Assemble release
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease
        working-directory: apps/merchant-android
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            apps/merchant-android/app/build/outputs/apk/release/*.apk
            apps/merchant-android/app/build/outputs/bundle/release/*.aab
